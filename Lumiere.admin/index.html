<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIERE — Admin Panel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .glass {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.25);
        }
        
        .number {
            font-feature-settings: "tnum";
        }
        
        .stat-card {
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: #d4af37;
        }
        
        .status-badge {
            font-size: 13px;
            padding: 5px 12px;
        }
        
        @media (max-width: 640px) {
            .status-badge {
                font-size: 12px;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-7xl mx-auto px-5 py-8 sm:py-12">
        
        <!-- Header -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-10">
            <div>
                <h1 class="text-4xl sm:text-5xl font-semibold tracking-tight">LUMIERE</h1>
                <p class="text-zinc-400 mt-1 text-base sm:text-lg">Canlı Monitorinq Paneli</p>
            </div>
            
            <div class="status-badge flex items-center gap-2 bg-zinc-900/80 text-emerald-400 border border-emerald-900/50 rounded-full self-start sm:self-auto">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="font-medium text-xs sm:text-sm">Realtime bağlı</span>
            </div>
        </div>

        <!-- Stats Grid - 4 kart -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 sm:gap-8">
            
            <!-- 1. Hazırda Saytda -->
            <div class="stat-card glass rounded-3xl p-8 sm:p-10">
                <div class="flex justify-between items-start mb-6">
                    <h3 class="text-zinc-400 text-lg font-medium">Hazırda saytda</h3>
                    <span class="text-emerald-400 text-2xl">●</span>
                </div>
                <div id="admin-online" class="number text-6xl sm:text-7xl font-semibold text-amber-400 tabular-nums">
                    0
                </div>
                <p class="text-zinc-500 mt-3">aktiv istifadəçi</p>
            </div>

            <!-- 2. Son 1 Saat -->
            <div class="stat-card glass rounded-3xl p-8 sm:p-10">
                <div class="flex justify-between items-start mb-6">
                    <h3 class="text-zinc-400 text-lg font-medium">Son 1 saat</h3>
                    <span class="text-amber-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 01-18 0 9 9 0 0118 0z" />
                        </svg>
                    </span>
                </div>
                <div id="admin-hour1" class="number text-6xl sm:text-7xl font-semibold text-amber-400 tabular-nums">
                    0
                </div>
                <p class="text-zinc-500 mt-3">baxış</p>
            </div>

            <!-- 3. Son 12 Saat -->
            <div class="stat-card glass rounded-3xl p-8 sm:p-10">
                <div class="flex justify-between items-start mb-6">
                    <h3 class="text-zinc-400 text-lg font-medium">Son 12 saat</h3>
                    <span class="text-amber-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </span>
                </div>
                <div id="admin-hour12" class="number text-6xl sm:text-7xl font-semibold text-amber-400 tabular-nums">
                    0
                </div>
                <p class="text-zinc-500 mt-3">baxış</p>
            </div>

            <!-- 4. Son 24 Saat (Mütləq saxlanıldı) -->
            <div class="stat-card glass rounded-3xl p-8 sm:p-10">
                <div class="flex justify-between items-start mb-6">
                    <h3 class="text-zinc-400 text-lg font-medium">Son 24 saat</h3>
                    <span class="text-amber-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.25">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </span>
                </div>
                <div id="admin-daily" class="number text-6xl sm:text-7xl font-semibold text-amber-400 tabular-nums">
                    0
                </div>
                <p class="text-zinc-500 mt-3">cəmi baxış</p>
            </div>

        </div>

        <div class="mt-16 text-center text-zinc-500 text-xs sm:text-sm">
            LUMIERE Admin • Supabase Realtime
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient(
            'https://pgnshyibgprjqvyzuisu.supabase.co', 
            'sb_publishable_YNpATpBsxVkT4HKUDWCdng_pwhBpb4U'
        );

        // Vaxt aralığına görə baxış sayı gətirən funksiya
        async function getViewsCount(minutes) {
            const timeAgo = new Date(Date.now() - minutes * 60 * 1000).toISOString();
            
            const { count } = await _supabase
                .from('page_views')
                .select('*', { count: 'exact', head: true })
                .gt('viewed_at', timeAgo);
            
            return count || 0;
        }

        // Bütün statistikaları yenilə
        async function updateAllStats() {
            try {
                // Son 1 saat
                const count1h = await getViewsCount(60);
                document.getElementById('admin-hour1').innerText = count1h.toLocaleString('az-AZ');

                // Son 12 saat
                const count12h = await getViewsCount(720); // 12 * 60 = 720 dəqiqə
                document.getElementById('admin-hour12').innerText = count12h.toLocaleString('az-AZ');

                // Son 24 saat
                const count24h = await getViewsCount(1440); // 24 * 60 = 1440 dəqiqə
                document.getElementById('admin-daily').innerText = count24h.toLocaleString('az-AZ');

            } catch (err) {
                console.error('Statistika yenilənərkən xəta baş verdi:', err);
            }
        }

        // Canlı online izləmə
        function trackAdminOnline() {
            const channel = _supabase.channel('lumiere_realtime_count');

            channel
                .on('presence', { event: 'sync' }, () => {
                    const state = channel.presenceState();
                    document.getElementById('admin-online').innerText = Object.keys(state).length;
                })
                .subscribe();
        }

        // Başlanğıc
        document.addEventListener('DOMContentLoaded', () => {
            updateAllStats();
            trackAdminOnline();
            
            // Hər 30 saniyədən bir yenilə
            setInterval(updateAllStats, 30000);
        });
    </script>
</body>
</html>
