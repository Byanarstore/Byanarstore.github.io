<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIERE — Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .glass {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 55, 0.25);
        }
        
        .number {
            font-feature-settings: "tnum";
        }
        
        .stat-card {
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: #d4af37;
        }
        
        .status-badge {
            font-size: 13px;
            padding: 5px 12px;
        }
        
        @media (max-width: 640px) {
            .status-badge { font-size: 12px; padding: 4px 10px; }
        }

        /* Shake animasiyası */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .animate-shake { animation: shake 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-black min-h-screen text-zinc-100">

    <!-- ====================== GİRİŞ EKRANI ====================== -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="w-full max-w-md px-6">
            <div class="glass rounded-3xl p-10 shadow-2xl">
                <!-- Logo -->
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-amber-400 to-yellow-600 rounded-2xl mb-6 shadow-inner">
                        <span class="text-3xl font-bold text-black">L</span>
                    </div>
                    <h1 class="text-4xl font-semibold tracking-tight">LUMIERE</h1>
                    <p class="text-zinc-400 mt-2">Admin Panelinə giriş</p>
                </div>

                <!-- Form -->
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-2">Şifrə</label>
                        <input 
                            id="password"
                            type="password"
                            placeholder="Şifrənizi daxil edin"
                            class="w-full bg-zinc-900 border border-zinc-700 focus:border-amber-400 rounded-2xl px-5 py-4 text-white outline-none transition-all text-lg"
                            autocomplete="current-password">
                    </div>

                    <button 
                        onclick="checkPassword()"
                        class="w-full bg-amber-400 hover:bg-amber-500 active:bg-amber-600 transition-all text-black font-semibold py-4 rounded-2xl text-lg tracking-wide">
                        Giriş et
                    </button>
                </div>

                <div id="error" class="mt-6 text-red-400 text-center text-sm min-h-[24px]"></div>
            </div>

            <p class="text-center text-zinc-500 text-xs mt-8">
                LUMIERE Admin Panel © 2026
            </p>
        </div>
    </div>

    <!-- ====================== ADMIN PANELİ ====================== -->
    <div id="admin-panel" class="hidden min-h-screen bg-zinc-950">
        <div class="max-w-7xl mx-auto px-5 py-8 sm:py-12">
            
            <!-- Header -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-10">
                <div>
                    <h1 class="text-4xl sm:text-5xl font-semibold tracking-tight">LUMIERE</h1>
                    <p class="text-zinc-400 mt-1 text-base sm:text-lg">Canlı Monitorinq Paneli</p>
                </div>
                
                <div class="status-badge flex items-center gap-2 bg-zinc-900/80 text-emerald-400 border border-emerald-900/50 rounded-full self-start sm:self-auto">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span class="font-medium text-xs sm:text-sm">Realtime bağlı</span>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 sm:gap-8">
                
                <!-- Hazırda Saytda -->
                <div class="stat-card glass rounded-3xl p-8 sm:p-10">
                    <div class="flex justify-between items-start mb-6">
                        <h3 class="text-zinc-400 text-lg font-medium">Hazırda saytda</h3>
                        <span class="text-emerald-400 text-2xl">●</span>
                    </div>
                    <div id="admin-online" class="number text-6xl sm:text-7xl font-semibold text-amber-400 tabular-nums">0</div>
                    <p class="text-zinc-500 mt-3">aktiv istifadəçi</p>
                </div>

                <!-- Son 1 Saat -->
                <div class="stat-card glass rounded-3xl p-8 sm:p-10">
                    <div class="flex justify-between items-start mb-6">
                        <h3 class="text-zinc-400 text-lg font-medium">Son 1 saat</h3>
                        <span class="text-amber-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 01-18 0 9 9 0 0118 0z" />
                            </svg>
                        </span>
                    </div>
                    <div id="admin-hour1" class="number text-6xl sm:text-7xl font-semibold text-amber-400 tabular-nums">0</div>
                    <p class="text-zinc-500 mt-3">baxış</p>
                </div>

                <!-- Son 12 Saat -->
                <div class="stat-card glass rounded-3xl p-8 sm:p-10">
                    <div class="flex justify-between items-start mb-6">
                        <h3 class="text-zinc-400 text-lg font-medium">Son 12 saat</h3>
                        <span class="text-amber-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                            </svg>
                        </span>
                    </div>
                    <div id="admin-hour12" class="number text-6xl sm:text-7xl font-semibold text-amber-400 tabular-nums">0</div>
                    <p class="text-zinc-500 mt-3">baxış</p>
                </div>

                <!-- Son 24 Saat -->
                <div class="stat-card glass rounded-3xl p-8 sm:p-10">
                    <div class="flex justify-between items-start mb-6">
                        <h3 class="text-zinc-400 text-lg font-medium">Son 24 saat</h3>
                        <span class="text-amber-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.25">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                            </svg>
                        </span>
                    </div>
                    <div id="admin-daily" class="number text-6xl sm:text-7xl font-semibold text-amber-400 tabular-nums">0</div>
                    <p class="text-zinc-500 mt-3">cəmi baxış</p>
                </div>
            </div>

            <div class="mt-16 text-center text-zinc-500 text-xs sm:text-sm">
                LUMIERE Admin • Supabase Realtime
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const CORRECT_PASSWORD = "250420";   // ← BURANI ÖZ ŞİFRƏN İLƏ DƏYİŞDİR

        const _supabase = supabase.createClient(
            'https://pgnshyibgprjqvyzuisu.supabase.co', 
            'sb_publishable_YNpATpBsxVkT4HKUDWCdng_pwhBpb4U'
        );

        // ==================== ŞİFRƏ YOXLAMASI ====================
        function checkPassword() {
            const input = document.getElementById('password');
            const errorEl = document.getElementById('error');
            const password = input.value.trim();

            errorEl.textContent = "";

            if (password === "") {
                errorEl.textContent = "Şifrəni daxil edin";
                input.focus();
                return;
            }

            if (password === CORRECT_PASSWORD) {
                // Giriş uğurlu → Login ekranını gizlət, admin panelini göstər
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                
                // Admin panelini işə sal
                initAdminPanel();
            } 
            else {
                errorEl.textContent = "Yanlış şifrə!";
                input.value = "";
                input.focus();
                input.classList.add('animate-shake');
                setTimeout(() => input.classList.remove('animate-shake'), 600);
            }
        }

        // ==================== ADMIN PANEL FUNKSIYALARI ====================
        async function getViewsCount(minutes) {
            const timeAgo = new Date(Date.now() - minutes * 60 * 1000).toISOString();
            const { count } = await _supabase
                .from('page_views')
                .select('*', { count: 'exact', head: true })
                .gt('viewed_at', timeAgo);
            return count || 0;
        }

        async function updateAllStats() {
            try {
                document.getElementById('admin-hour1').innerText = (await getViewsCount(60)).toLocaleString('az-AZ');
                document.getElementById('admin-hour12').innerText = (await getViewsCount(720)).toLocaleString('az-AZ');
                document.getElementById('admin-daily').innerText = (await getViewsCount(1440)).toLocaleString('az-AZ');
            } catch (err) {
                console.error('Statistika xətası:', err);
            }
        }

        function trackAdminOnline() {
            const channel = _supabase.channel('lumiere_realtime_count');
            channel
                .on('presence', { event: 'sync' }, () => {
                    const state = channel.presenceState();
                    document.getElementById('admin-online').innerText = Object.keys(state).length;
                })
                .subscribe();
        }

        function initAdminPanel() {
            updateAllStats();
            trackAdminOnline();
            setInterval(updateAllStats, 30000);   // hər 30 saniyədə yenilə
        }

        // Enter düyməsi dəstəyi
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        // Avtomatik fokus
        window.onload = () => {
            document.getElementById('password').focus();
        };
    </script>
</body>
</html>
