<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIERE Logistics - Final Fix</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        .container { padding: 15px; max-width: 480px; margin: auto; }
        .box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        
        input { 
            width: 100%; padding: 15px; margin: 10px 0; background: #222; 
            border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; font-size: 16px;
        }

        /* AXTARIŇě EKRANI */
        #searchOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 100000;
            display: none; flex-direction: column; padding: 20px; box-sizing: border-box;
        }
        #searchOverlay input { border: 2px solid var(--gold); margin-bottom: 15px; background: #111; }
        #results { flex: 1; overflow-y: auto; background: #111; border-radius: 10px; border: 1px solid #222; }
        
        .search-item { 
            padding: 18px; border-bottom: 1px solid #333; 
            color: #fff; font-size: 15px; cursor: pointer;
        }
        .search-item:active { background: var(--gold); color: #000; }
        
        .status-msg { padding: 20px; text-align: center; color: var(--gold); font-size: 14px; }
        .close-btn { color: var(--gold); text-align: right; padding: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }

        .selected-box { border: 2px solid var(--green) !important; color: var(--green) !important; }

        button { 
            width: 100%; padding: 18px; background: var(--gold); border: none; 
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px;
        }

        .navbar {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #111;
            display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222;
        }
        .nav-item { color: #888; font-size: 12px; text-align: center; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--gold); font-weight: bold; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--gold); text-align: center; letter-spacing: 3px; margin: 20px 0;">LUMIERE</h2>

    <div id="homePage" class="page" style="display:none;">
        <div id="listAll"></div>
    </div>

    <div id="addPage" class="page" style="display:block;">
        <div class="box">
            <input type="text" id="mId" placeholder="M√ľŇüt…ôri ID">
            <input type="text" id="mName" placeholder="M√ľŇüt…ôri Ad Soyad">
            
            <div id="triggerSearch" onclick="openSearch()" style="background:#222; padding:18px; border-radius:10px; border:1px solid #444; color:#aaa; margin:10px 0; cursor:pointer; text-align:center; font-weight:bold;">
                ūüďć √úNVANI SE√áM∆ŹK √ú√á√úN TOXUN
            </div>

            <div style="display: flex; gap: 10px;">
                <input type="text" id="mBlock" placeholder="Blok">
                <input type="text" id="mFloor" placeholder="M…ôrt…ôb…ô">
            </div>
            
            <input type="hidden" id="lat">
            <input type="hidden" id="lng">
            <input type="hidden" id="fullAddr">
            <button onclick="save()">SńįSTEM∆Ź ∆ŹLAV∆Ź ET</button>
        </div>
    </div>
</div>

<div id="searchOverlay">
    <div class="close-btn" onclick="closeSearch()">BAńěLA ‚úĖ</div>
    <input type="text" id="modalInput" placeholder="K√ľ√ß…ô adńĪ yazńĪn (m…ôs: Nizami)..." autocomplete="off">
    <div id="results">
        <div class="status-msg">K√ľ√ß…ô adńĪnńĪ yazmańüa baŇülayńĪn...</div>
    </div>
</div>

<div class="navbar">
    <div class="nav-item" onclick="show('homePage', this)">ūüŹ†<br>Ana S…ôhif…ô</div>
    <div class="nav-item active" onclick="show('addPage', this)">‚ěē<br>∆Źlav…ô Et</div>
</div>

<script>
    let db = [];

    function show(id, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        el.classList.add('active');
        if(id === 'homePage') render();
    }

    function openSearch() {
        document.getElementById('searchOverlay').style.display = 'flex';
        document.getElementById('modalInput').focus();
    }

    function closeSearch() {
        document.getElementById('searchOverlay').style.display = 'none';
    }

    let searchTimeout;
    document.getElementById('modalInput').addEventListener('input', function() {
        clearTimeout(searchTimeout);
        const val = this.value.trim();
        const resDiv = document.getElementById('results');

        if(val.length < 3) {
            resDiv.innerHTML = '<div class="status-msg">∆Źn az 3 h…ôrf yazńĪn...</div>';
            return;
        }

        resDiv.innerHTML = '<div class="status-msg">AxtarńĪlńĪr...</div>';

        searchTimeout = setTimeout(() => {
            // "Azerbaijan, Baku" s√∂z√ľn√ľ qabaqcadan …ôlav…ô edirik ki, daha d…ôqiq tapsńĪn
            const query = `Baku, ${val}`;
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=8&addressdetails=1`)
            .then(r => r.json())
            .then(data => {
                resDiv.innerHTML = '';
                if(data.length === 0) {
                    resDiv.innerHTML = '<div class="status-msg">M…ôlumat tapńĪlmadńĪ. Bir az f…ôrqli yazńĪn.</div>';
                    return;
                }
                data.forEach(item => {
                    const d = document.createElement('div');
                    d.className = 'search-item';
                    d.innerHTML = `ūüďć ${item.display_name}`;
                    d.onclick = function() {
                        document.getElementById('fullAddr').value = item.display_name;
                        document.getElementById('lat').value = item.lat;
                        document.getElementById('lng').value = item.lon;
                        
                        const trigger = document.getElementById('triggerSearch');
                        trigger.innerText = "‚úÖ √únvan Se√ßildi";
                        trigger.classList.add('selected-box');
                        
                        closeSearch();
                    };
                    resDiv.appendChild(d);
                });
            })
            .catch(err => {
                resDiv.innerHTML = '<div class="status-msg">X…ôta baŇü verdi. ńįnterneti yoxlayńĪn.</div>';
            });
        }, 600); // ńįstifad…ô√ßi yazmańüńĪ bitir…ônd…ôn 0.6 saniy…ô sonra axtar
    });

    function save() {
        const lat = document.getElementById('lat').value;
        if(!lat) { alert("SiyahńĪdan √ľnvanńĪ se√ßin!"); return; }

        db.push({
            id: document.getElementById('mId').value || "---",
            name: document.getElementById('mName').value || "AdsńĪz",
            address: document.getElementById('fullAddr').value,
            block: document.getElementById('mBlock').value || "-",
            floor: document.getElementById('mFloor').value || "-",
            lat: lat, lng: document.getElementById('lng').value
        });

        // Reset
        document.getElementById('lat').value = "";
        document.getElementById('triggerSearch').innerText = "ūüďć √úNVANI SE√áM∆ŹK √ú√á√úN TOXUN";
        document.getElementById('triggerSearch').classList.remove('selected-box');
        
        alert("Sistem…ô uńüurla …ôlav…ô edildi!");
        show('homePage', document.querySelectorAll('.nav-item')[0]);
    }

    function render() {
        const list = document.getElementById('listAll');
        list.innerHTML = '';
        if(db.length === 0) list.innerHTML = '<div style="text-align:center; color:#888; margin-top:50px;">H…ôl…ô ki siyahńĪ boŇüdur.</div>';
        db.forEach(d => {
            list.innerHTML += `
                <div class="card">
                    <b style="color:var(--gold)">ID: ${d.id}</b><br>
                    <span style="font-size:18px;">${d.name}</span><br>
                    <small style="color:#aaa;">${d.address}</small><br>
                    <div style="margin-top:10px; font-size:12px;">Blok: ${d.block} | M…ôrt…ôb…ô: ${d.floor}</div>
                </div>`;
        });
    }
</script>
</body>
</html>
